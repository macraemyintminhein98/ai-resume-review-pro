<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>APEX Resume Review</title><meta name="description" content="AI-powered resume feedback in seconds."><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"><style>body{font-family: 'Inter', sans-serif;}.input-area{min-height:200px;}</style></head><body class="bg-gray-100 text-gray-900"><div class="container mx-auto p-4 max-w-2xl"><h1 class="text-4xl font-bold text-center my-8">APEX Resume Review</h1><p class="mb-6 text-center text-gray-700">Get instant, AI-powered feedback on your resume.</p><div class="bg-white p-6 rounded-lg shadow-md"><label for="resume-text" class="block text-lg font-medium text-gray-800 mb-2">Paste your resume here:</label><textarea id="resume-text" class="input-area w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" placeholder="Paste your resume text..." rows="10"></textarea><label for="job-description" class="block text-lg font-medium text-gray-800 mb-2">Optional: Paste job description:</label><textarea id="job-description" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6" placeholder="Paste relevant job description for tailored feedback..." rows="5"></textarea><button id="analyze-btn" class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 transition duration-300 font-semibold">Review My Resume</button><div id="feedback-area" class="mt-8 p-4 bg-gray-50 border border-gray-200 rounded-md hidden"><h2 class="text-2xl font-semibold mb-3">Your Feedback:</h2><p id="feedback-content" class="text-gray-800"></p><button id="checkout-btn" class="mt-4 w-full bg-green-600 text-white py-3 rounded-md hover:bg-green-700 transition duration-300 font-semibold">Unlock Full Feedback ($9.99)</button></div></div><p class="text-center text-gray-600 mt-8">&copy; 2024 APEX Digital Products</p></div><script>document.getElementById('analyze-btn').addEventListener('click', async () => {const resumeText = document.getElementById('resume-text').value;const jobDescription = document.getElementById('job-description').value;if (!resumeText.trim()) {alert('Please paste your resume text to get feedback.');return;}document.getElementById('feedback-area').classList.remove('hidden');document.getElementById('feedback-content').innerText = 'Analyzing your resume... This is a simulated preview. For full results, please proceed to payment.';document.getElementById('checkout-btn').classList.remove('hidden');});document.getElementById('checkout-btn').addEventListener('click', () => {alert('Simulated checkout for $9.99. In a real application, this would redirect to Stripe.');});</script></body></html>
